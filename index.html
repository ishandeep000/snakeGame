<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3 class="highScore">High Score: 
                        <span id="high-score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3 class="score">Score: 
                        <span id="score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3 class="time">Time: 
                        <span id="time">00:00</span>
                    </h3>
                </div>
            </div>
            <div class="modal">
                <div class="start-game">
                    <h3>Welcome To The Snake Game</h3>
                    <button class="btn start-btn">Start</button>
                </div> 
                <div class="game-over">
                    <h3>Restart Game</h3>
                    <button class="btn restart-btn">Restart</button>
                </div>
            </div>
            <div class="board"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
